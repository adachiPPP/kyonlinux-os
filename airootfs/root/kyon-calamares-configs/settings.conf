# Configuration file for Calamares
---
modules-search: [ local ]

instances:
  - id:       desktop
    module:   packagechooser
    config:   packagechooser_desktop.conf
  - id:       bootloader
    module:   packagechooser
    config:   packagechooser_bootloader.conf
  - id:       modify_mk_hook
    module:   shellprocess
    config:   shellprocess_modify_mk_hook.conf
  - id:       initialize_pacman
    module:   shellprocess
    config:   shellprocess_initialize_pacman.conf
  - id:       reset_mk_hook
    module:   shellprocess
    config:   shellprocess_reset_mk_hook.conf
  - id:       db
    module:   shellprocess
    config:   shellprocess_db.conf
  - id:       btrfs_snapshot
    module:   shellprocess
    config:   shellprocess_btrfs_snapshot.conf
  - id:       enable_ufw
    module:   shellprocess
    config:   shellprocess_enable_ufw.conf
  - id:       dms
    module:   shellprocess
    config:   shellprocess_dms.conf
  - id:       cleanup_calamares
    module:   shellprocess
    config:   shellprocess_cleanup_calamares.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - packagechooser@bootloader
      - partition
      - packagechooser@desktop
      - netinstall
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - shellprocess@modify_mk_hook
      - shellprocess@initialize_pacman
      - locale
      - keyboard
      - localecfg
      - users
      - networkcfg
      - hwclock
      - shellprocess@db
      - packages
      - displaymanager
      - services-systemd
      - grubcfg
      - bootloader
      - shellprocess@reset_mk_hook
      - shellprocess
      - shellprocess@btrfs_snapshot
      - shellprocess@enable_ufw
      - shellprocess@dms
      - shellprocess@cleanup_calamares
      - umount
  - show:
      - finished

branding: kyonlinux

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
