# Configuration for the low-density software chooser
---
mode: required

method: legacy

labels:
    step: "Bootloader"
    step[ru]: "Загрузчик"

default: systemd-boot

items:
    - id: grub
      name: "GRUB"
      description: "GRUB is the oldest of the available boot managers. It has a very large feature set, works on almost every machine, and remains the most widely used Linux boot manager. Tip: Choose GRUB if you need encrypted /boot, BIOS compatibility, or want Btrfs snapshots with a stable, mature boot manager."
      description[pt_BR]: "O GRUB é o mais antigo dos gerenciadores de inicialização disponíveis. Oferece muitos recursos, funciona em praticamente qualquer máquina e continua sendo o gerenciador de inicialização mais utilizado no Linux. Dica: escolha o GRUB se precisar de /boot criptografado, compatibilidade com BIOS ou quiser snapshots Btrfs com um gerenciador de inicialização estável e maduro."
      screenshot: "/etc/calamares/images/bootloaders/grub.jxl"

    - id: refind
      name: "rEFInd"
      efiOnly: true
      description: "A fork of rEFIt, rEFInd was primarily made to make it easier for MacOS users to multi-boot. However, rEFInd has evolved into being hardware agnostic, making it a great choice for multi-booting on any system. The main draw of rEFInd is its ability to scan all storage devices at boot and correspondingly display entries for each OS/Kernel found. Tip: Choose rEFInd if you want a polished graphical interface and automatic multi-boot detection on UEFI systems."
      description[pt_BR]: "Um fork do rEFIt, o rEFInd foi criado principalmente para facilitar o multi-boot para usuários de macOS. Com o tempo, porém, evoluiu para se tornar independente do hardware, tornando-se uma ótima escolha para multi-boot em qualquer sistema. O principal destaque do rEFInd é sua capacidade de varrer todos os dispositivos de armazenamento durante a inicialização e exibir automaticamente entradas para cada sistema operacional ou kernel encontrado. Dica: escolha o rEFInd se quiser uma interface gráfica refinada e detecção automática de multi-boot em sistemas UEFI."
      screenshot: "/etc/calamares/images/bootloaders/refind.jxl"

    - id: refind-ai
      name: "rEFInd + AI SDK"
      efiOnly: true
      description: "This is a refind option with the AI SDK. If you don’t know why you need it, don’t choose it instead of usual rEFInd variant."
      description[pt_BR]: "Esta é uma opção do rEFInd com o AI SDK. Se você não sabe por que precisa disso, não a escolha em vez da variante normal do rEFInd."
      screenshot: "/etc/calamares/images/bootloaders/refind.jxl"

    - id: systemd-boot
      name: "systemd-boot"
      efiOnly: true
      description: "Part of the systemd family, systemd-boot was created to be as simple as possible. This simple yet efficient design ensures it is reliable and fast, but it comes at the cost of advanced features supported by other boot managers. Tip: Choose systemd-boot if you prefer the simplest setup and don’t require snapshots or advanced features. It’s also the most reliable fallback for MSI motherboards with UEFI issues."
      description[pt_BR]: "Parte da família systemd, o systemd-boot foi criado para ser o mais simples possível. Esse design simples e eficiente garante que seja confiável e rápido, mas sem os recursos avançados suportados por outros gerenciadores de inicialização. Dica: escolha o systemd-boot se preferir a configuração mais simples e não precisar de snapshots ou recursos avançados. Também é a alternativa mais confiável para placas-mãe MSI com problemas de UEFI."
      screenshot: "/etc/calamares/images/bootloaders/systemd-boot.jxl"

    - id: limine
      name: "Limine"
      description: "Limine is a modern, advanced, and portable multiprotocol bootloader. It serves as the reference implementation for the Limine boot protocol and supports Linux as well as chainloading other loaders. Tip: Choose Limine if you want a modern bootloader with Btrfs snapshot integration out of the box, plus support for both BIOS and UEFI and Windows dual-boot (via limine-scan)."
      description[pt_BR]: "Limine é um gerenciador de inicialização multiprotocolo moderno, avançado e portátil. Ele serve como implementação de referência do protocolo de inicialização Limine e oferece suporte ao Linux, além de permitir encadear outros gerenciadores de inicialização. Dica: escolha Limine se quiser um gerenciador de inicialização moderno com integração nativa de snapshots Btrfs, além de suporte a BIOS e UEFI e dual-boot com Windows (via limine-scan)."
      screenshot: "/etc/calamares/images/bootloaders/limine.jxl"
