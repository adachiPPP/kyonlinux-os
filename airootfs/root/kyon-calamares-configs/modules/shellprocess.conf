---
dontChroot: false
timeout: 3600
script:
    - "pacman -Sy --noconfirm"
    - "-rm /etc/systemd/system/etc-pacman.d-gnupg.mount"
    - command: "echo "
    - "echo "
    - "echo "
    - '-runuser ${USER} -c "cp -rf /etc/skel/. /home/${USER}/."'
    - '-runuser ${USER} -c "rm -rf /home/${USER}/{.xsession,.xprofile,.xinitrc}"'
    - command: "bash /etc/calamares/scripts/shell-setup ${USER}"
      verbose: true
    - '-rm /etc/calamares/scripts/shell-setup'
    - command: "bash /etc/calamares/scripts/bootloader-post-setup ${gs[packagechooser_bootloader]}"
    - "-rm /etc/calamares/scripts/bootloader-post-setup"
    - "-rm -f /etc/systemd/system/getty@tty1.service.d/autologin.conf"
    - "-rmdir /etc/systemd/system/getty@tty1.service.d"
    - command: "bash -c 'grep -q \"User=root\" /etc/sddm.conf.d/autologin.conf 2>/dev/null && rm -f /etc/sddm.conf.d/autologin.conf; true'"